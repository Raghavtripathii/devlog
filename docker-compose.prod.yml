# This runs BOTH the database AND the backend in containers together.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devlog_user
      POSTGRES_PASSWORD: devlog_secret
      POSTGRES_DB: devlog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlog_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://devlog_user:devlog_secret@postgres:5432/devlog
      SECRET_KEY: change-this-in-real-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GEMINI_API_KEY: ""
    ports:
      - "8000:8000"

volumes:
  postgres_data: